<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Webpage</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      line-height: 1.6;
    }

    header {
      background: #333;
      color: #fff;
      padding: 15px;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      background: #555;
    }

    nav a {
      color: white;
      padding: 14px 20px;
      text-decoration: none;
      display: block;
    }

    nav a:hover {
      background: #777;
    }

    .container {
      display: flex;
      padding: 20px;
      gap: 20px;
    }

    .main {
      flex: 3;
      background: #f4f4f4;
      padding: 20px;
    }

    .sidebar {
      flex: 1;
      background: #ddd;
      padding: 20px;
    }

    footer {
      text-align: center;
      padding: 10px;
      background: #333;
      color: white;
      margin-top: 20px;
    }

    /* Tablet */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }
    }

    /* Mobile */
    @media (max-width: 480px) {
      nav {
        flex-direction: column;
      }

      nav a {
        text-align: center;
        border-top: 1px solid #666;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>My Responsive Website</h1>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>

  <div class="container">
    <div class="main">
      <h2>Main Content</h2>
      <p>This is the main content area. Resize the browser to see responsiveness.</p>
    </div>

    <div class="sidebar">
      <h3>Sidebar</h3>
      <p>This is the sidebar content.</p>
    </div>
  </div>

  <footer>
    <p>© 2026 My Website</p>
  </footer>

</body>
</html>
